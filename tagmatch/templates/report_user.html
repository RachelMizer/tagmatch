{% extends "base.html" %}
{% block content %}

<div class="report-form-cont">
    <h2>Report User</h2>
    <p class="report-target">
        You are reporting <strong>{{ target.username }}</strong>.<br>
        <span style="color:#aaa; font-size:0.82rem;">Reports are reviewed by the site administrator.</span>
    </p>

    <form method="post">
        {% csrf_token %}

        <div class="report-field">
            <label for="id_reason">Reason</label>
            {{ form.reason }}
        </div>

        <div class="report-field">
            <label for="id_description">Description</label>
            {{ form.description }}
        </div>

        <div class="form-actions">
            <button type="submit" class="btn-danger">Submit Report</button>
            <a href="{% url 'profile' target.username %}" class="cancel-link" style="font-family:montserratbold; text-transform:uppercase; font-size:0.85rem; letter-spacing:0.05rem; color:#5f3db3;">Cancel</a>
        </div>
    </form>
</div>

{% endblock %}
