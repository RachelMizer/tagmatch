{% extends "base.html" %}
{% block content %}
<div class="prof-cont">
    <h2 class="pagetitle">Report User</h2>
    <p>You are reporting <strong>{{ target.username }}</strong>.</p>
    <p style="color: #666; font-size: 0.9rem;">
        Reports are reviewed by the site administrator. Please provide as much detail as possible.
    </p>
    <br />
    <form method="post">
        {% csrf_token %}
        <table>
            <tr>
                <td><label for="id_reason">Reason</label></td>
                <td>{{ form.reason }}</td>
            </tr>
            <tr>
                <td><label for="id_description">Description</label></td>
                <td>{{ form.description }}</td>
            </tr>
        </table>
        <br />
        <button type="submit">Submit Report</button>
        <a href="{% url 'profile' target.username %}" style="margin-left: 16px;">Cancel</a>
    </form>
</div>
{% endblock %}
