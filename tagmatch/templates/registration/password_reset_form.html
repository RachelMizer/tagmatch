{% extends "base.html" %}
{% block content %}
<div class="prof-cont">
    <h2 class="pagetitle">Reset Your Password</h2>
    <p>Enter the email address associated with your account and we'll send you a reset link.</p>
    <form method="post">
        {% csrf_token %}
        <table>
            <tr>
                <td><label for="id_email">Email Address</label></td>
                <td>{{ form.email }}</td>
            </tr>
        </table>
        <br />
        <button type="submit">Send Reset Link</button>
    </form>
</div>
{% endblock %}
