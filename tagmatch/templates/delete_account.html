{% extends "base.html" %}
{% block content %}

<div class="action-card danger">
    <div class="action-icon">⚠️</div>
    <h2>Delete Account</h2>
    <p>Are you sure you want to <strong>permanently delete</strong> your account?</p>
    <p class="action-meta">
        Your profile, photos, messages, and all associated data will be removed immediately.
        This cannot be undone.
    </p>
    <form method="post">
        {% csrf_token %}
        <div class="action-buttons">
            <button type="submit" class="btn-danger">Yes, Delete My Account</button>
            <a href="{% url 'edit_profile' %}" class="cancel-link">Cancel</a>
        </div>
    </form>
</div>

{% endblock %}
